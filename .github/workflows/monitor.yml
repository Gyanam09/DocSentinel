name: DocSentinel Monthly Land Monitor

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:
  repository_dispatch:
    types: [run_pipeline]

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python libraries
        run: |
          pip install requests sentinelsat rasterio numpy python-dotenv
          pip install jinja2 pdfkit opencv-python-headless matplotlib Pillow
          pip install resend overpy

      - name: Install wkhtmltopdf
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wkhtmltopdf

      - name: Create .env file
        run: |
          echo "CDSE_USERNAME=${{ secrets.CDSE_USERNAME }}" >> .env
          echo "CDSE_PASSWORD=${{ secrets.CDSE_PASSWORD }}" >> .env
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
          echo "FIRMS_MAP_KEY=${{ secrets.FIRMS_MAP_KEY }}" >> .env

      - name: Apply requested coordinates
        if: github.event_name == 'repository_dispatch'
        run: |
          python run.py \
            "${{ github.event.client_payload.min_lat }}" \
            "${{ github.event.client_payload.max_lat }}" \
            "${{ github.event.client_payload.min_lon }}" \
            "${{ github.event.client_payload.max_lon }}" \
            --scene-date "${{ github.event.client_payload.scene_date }}" \
            --client-email "${{ github.event.client_payload.client_email }}" \
            --config-only

      - name: Download Sentinel-2 bands
        run: python download_bands.py

      - name: Calculate NDVI and detect changes
        run: python calculate_ndvi.py

      - name: Fetch NASA GIBS basemap
        run: python fetch_gibs.py

      - name: Fetch OSM land-use context
        run: python fetch_osm.py

      - name: Fetch elevation data
        run: python fetch_elevation.py

      - name: Fetch fire data
        run: python fetch_fire.py

      - name: Fetch weather and climate
        run: python fetch_weather.py

      - name: Fetch soil intelligence
        run: python fetch_soil.py

      - name: Fetch infrastructure data
        run: python fetch_infrastructure.py

      - name: Generate HTML and PDF report
        run: python generate_report.py
        env:
          WKHTMLTOPDF_PATH: /usr/bin/wkhtmltopdf

      - name: Generate 3D terrain viewer
        run: python generate_3d_terrain.py

      - name: Send report via Resend
        run: python send_report.py

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docsentinel-report-${{ github.run_number }}
          path: |
            output/report.html
            output/report.pdf
            output/ndvi_t1_map.png
            output/loss_contours.png
            output/true_color.png
            output/elevation_map.png
            output/fire_map.png
            output/terrain_3d.html
            output/docsentinel_report.zip
          retention-days: 30
